# client.cfg — configuratie pentru clientul PIF.
# Sintaxa libconfig: key = value;  (';' obligatoriu)
# Valorile de aici pot fi suprascrise din CLI:
#   ./pif-client -h 192.168.1.10 -F blur -i foto.jpg -o rezultat.jpg

server:
{
    host = "127.0.0.1";
    port = 18082;
};

client:
{
    # Filtrul implicit. Valori acceptate (ce suporta serverul GraphicsMagick):
    #   grayscale | blur | negate | edge
    filter_name = "grayscale";

    # Caile implicite pentru imagine de intrare si rezultat.
    input_path  = "./input.jpg";
    output_path = "./output.jpg";
};
